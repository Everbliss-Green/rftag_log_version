<meta charset="UTF-8">

<meta name="description" content="RFTag app release notes for iOS and Android.">
<title>RFTag · Release Notes</title>
<style>
  :root {
    --bg: #0b0f14;
    --card: #141b24;
    --border: #1f2a36;
    --text: #e6edf3;
    --muted: #8b97a5;
    --green: #22c55e;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 620px; margin: 0 auto; padding: 56px 20px 64px; }

  .topbar { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; }
  h1 { font-size: 1.6rem; margin: 0 0 4px; letter-spacing: -0.01em; }
  .sub { color: var(--muted); margin: 0 0 32px; font-size: 0.95rem; }

  /* Language picker */
  select#lang {
    appearance: none; -webkit-appearance: none;
    background: var(--card); color: var(--text);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 8px 30px 8px 12px; font-size: 0.9rem; cursor: pointer;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%238b97a5' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");
    background-repeat: no-repeat; background-position: right 10px center;
    flex: 0 0 auto;
  }
  select#lang:focus { outline: none; border-color: var(--green); }

  /* Version accordion */
  details {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  summary {
    list-style: none;
    cursor: pointer;
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-weight: 600;
  }
  summary::-webkit-details-marker { display: none; }
  .ver { font-size: 1.1rem; }
  .date { color: var(--muted); font-weight: 400; font-size: 0.85rem; }
  .chev {
    margin-left: auto;
    transition: transform 0.2s ease;
    color: var(--muted);
  }
  details[open] .chev { transform: rotate(90deg); }

  .body { padding: 0 18px 18px; border-top: 1px solid var(--border); }
  .body h2 {
    font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--muted); margin: 18px 0 8px;
  }
  .body h2 .muted { font-weight: 400; }
  ul { margin: 0; padding-left: 20px; }
  li { margin: 7px 0; color: #c3cdd8; font-size: 0.96rem; }
  li b { color: var(--text); font-weight: 600; }
  .tag-dev {
    display: inline-block; margin-left: 6px; vertical-align: middle;
    padding: 1px 8px; border-radius: 999px; font-size: 0.68rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.06em;
    color: #f0b429; background: rgba(240,180,41,0.14);
    border: 1px solid rgba(240,180,41,0.4);
  }

  footer {
    text-align: center; color: var(--muted); font-size: 0.8rem;
    margin-top: 40px;
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <div>

    </div>

      <option value="zh">中文</option>

  <div id="versions"></div>

  <footer id="t-footer"></footer>

</div>

function renderList(items, devLabel) {
  return items.map(function (it) {
    var tag = it.dev ? ' <span class="tag-dev">' + devLabel + '</span>' : '';
    return '<li><b>' + it.b + '</b>' + tag + ' — ' + it.d + '</li>';
  }).join('');
}

var CHEVRON = '<svg class="chev" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"></polyline></svg>';

function renderVersions(t) {
  return t.versions.map(function (v, i) {
    return '' +
      '<details' + (i === 0 ? ' open' : '') + '>' +
        '<summary>' +
          '<span class="ver">' + v.ver + '</span>' +
          '<span class="date">' + v.date + '</span>' +
          CHEVRON +
        '</summary>' +
        '<div class="body">' +
          '<h2>' + t.newTitle + '</h2>' +
          '<ul>' + renderList(v.newList, t.dev) + '</ul>' +
          '<h2>' + t.fwTitle + ' <span class="muted">(' + v.fwVersion + ')</span></h2>' +
          '<ul>' + renderList(v.fwList, t.dev) + '</ul>' +
        '</div>' +
      '</details>';
  }).join('');
}

function apply(lang) {
  var t = I18N[lang] || I18N.en;
  document.documentElement.lang = t.htmlLang;
  document.getElementById('t-notes').innerHTML = t.notes;
  document.getElementById('t-sub').innerHTML = t.sub;
  document.getElementById('versions').innerHTML = renderVersions(t);
  document.getElementById('t-footer').innerHTML = t.footer;
}

(function init() {
  var sel = document.getElementById('lang');
  var saved = null;
  try { saved = localStorage.getItem('rftag_lang'); } catch (e) {}
  var initial = saved || (navigator.language || 'en').slice(0, 2).toLowerCase();
  if (!I18N[initial]) initial = 'en';
  sel.value = initial;
  apply(initial);
  sel.addEventListener('change', function () {
    apply(sel.value);
    try { localStorage.setItem('rftag_lang', sel.value); } catch (e) {}
  });
})();
</script>
